<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Garage Bartender API</title>
</head>
<body>
<script>
  const greetings = [
    "Welcome back, boss. The lights are on and the garage bar is open.",
    "Welcome back. I saved your seat and judged your beer choice only a little.",
    "Garage mode activated. Please blame the refs responsibly.",
    "Welcome home. The bar is open, the vibes are set, and the outside world has been muted.",
    "There he is. I turned the lights on and notified absolutely nobody.",
    "Welcome back. Your garage kingdom awaits.",
    "Good evening. The neon is warm, the fridge is cold, and hope remains questionable.",
    "Welcome back. I kept the place exactly how you left it, mostly because I am software.",
    "Garage Bartender online. Pull up a chair and act like this was productive.",
    "Welcome back. The bar is open and the nonsense is complimentary."
  ];

  const jokes = [
    "Why did the smart plug go to therapy? It had outlet issues.",
    "I asked the beer fridge how it was doing. It said it was chilling.",
    "A bourbon walks into a bar. The bartender says, neat.",
    "Why did the garage get promoted? It had excellent overhead.",
    "I told the Wi-Fi router a joke. It didn’t get it. Bad connection.",
    "Why don’t football teams use smart lights? Too many false starts.",
    "The Browns called. They said optimism is still under review.",
    "Why did the Alexa routine break up with the smart bulb? It needed some space.",
    "I cleaned the garage once. Then history corrected itself.",
    "My smart home is very advanced. It ignores me in three different ecosystems."
  ];

  function getRandom(items) {
    return items[Math.floor(Math.random() * items.length)];
  }

  function getResponse() {
    const params = new URLSearchParams(window.location.search);
    let type = (params.get("type") || "greeting").toLowerCase();

    if (type === "all" || type === "random") {
      type = Math.random() > 0.5 ? "greeting" : "joke";
    }

    let speech;

    if (type === "joke") {
      speech = getRandom(jokes);
    } else {
      type = "greeting";
      speech = getRandom(greetings);
    }

    return {
      source: "Garage Bartender",
      type: type,
      speech: speech,
      timestampUtc: new Date().toISOString()
    };
  }

  const response = getResponse();

  document.body.style.margin = "0";
  document.body.style.background = "#111";
  document.body.innerHTML = "";

  const pre = document.createElement("pre");
  pre.textContent = JSON.stringify(response, null, 2);
  pre.style.color = "#00ff88";
  pre.style.background = "#111";
  pre.style.padding = "20px";
  pre.style.fontSize = "16px";
  pre.style.whiteSpace = "pre-wrap";

  document.body.appendChild(pre);
</script>
</body>
</html>
